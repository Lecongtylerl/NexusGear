<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusGear | Premium Gaming &amp; Tech Gear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    /* ===================================================
       NexusGear · SEG3125 Assignment 4 (E-Commerce)
       Tyler Le · 300401351
       Theme: refined graphite canvas with a considered crimson
       accent. React (CDN) high-fidelity prototype.
       =================================================== */
    :root {
      --bg-primary:  #0E0D11;
      --bg-surface:  #141317;
      --bg-elevated: #1C1A20;
      --bg-card:     #18161B;

      --accent:   #F04E63;      /* crimson (used sparingly for emphasis) */
      --accent-2: #E14E6A;
      --gradient: linear-gradient(135deg, #F04E63 0%, #D5395A 100%);

      --deal:     #E7B24A;      /* incite-to-action / promo (refined amber) */
      --deal-2:   #D99A38;
      --success:  #34C77B;
      --danger:   #FF6B81;      /* error */

      --text-primary:   #ECEAEF;
      --text-secondary: #9B96A2;
      --text-muted:     #625D6A;

      --border:       rgba(255, 255, 255, 0.065);
      --border-hover: rgba(240, 78, 99, 0.34);

      --radius-card: 14px;
      --radius-sm:   10px;
      --shadow: 0 24px 60px -26px rgba(0,0,0,0.65);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content:''; position: fixed; inset:0; pointer-events:none; z-index:9999;
      opacity:0.02; mix-blend-mode: overlay;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    h1,h2,h3,h4,h5,h6 { font-family:'Space Grotesk', sans-serif; line-height:1.15; }
    a { text-decoration:none; color:inherit; }
    button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
    ul { list-style:none; }
    ::-webkit-scrollbar { width:8px; height:8px; }
    ::-webkit-scrollbar-track { background: var(--bg-surface); }
    ::-webkit-scrollbar-thumb { background: #322E38; border-radius:4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .container { width:100%; max-width:1240px; margin:0 auto; padding:0 20px; }
    .gradient-text {
      background: linear-gradient(135deg,#FBEAEC 0%,#F5455C 100%);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    }
    .sr-only { position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

    /* ===== Top promo bar (INCITE TO ACTION) ===== */
    .promo-bar {
      background: var(--bg-elevated);
      border-bottom:1px solid var(--border);
      color: var(--text-secondary); text-align:center; font-weight:500; font-size:0.82rem;
      padding:9px 16px; letter-spacing:0.2px; position:relative; z-index:60;
    }
    .promo-bar b { color: var(--deal); font-weight:700; }
    .promo-bar .code {
      background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text-primary);
      padding:2px 9px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:0.78rem; margin:0 3px;
    }

    /* ===== Header ===== */
    .site-header {
      position:sticky; top:0; z-index:50;
      background: rgba(14,13,17,0.88); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom:1px solid var(--border);
    }
    .header-inner { display:flex; align-items:center; gap:20px; padding:14px 0; }
    .brand { display:flex; align-items:center; gap:10px; font-family:'Space Grotesk'; font-weight:800; font-size:1.25rem; letter-spacing:-0.5px; white-space:nowrap; }
    .brand .logo {
      width:34px; height:34px; border-radius:9px; display:grid; place-items:center;
      background:var(--gradient); color:#fff; font-size:1.1rem; box-shadow:0 6px 16px -4px rgba(245,69,92,0.6);
    }
    .brand span { color:var(--accent); }

    .search-wrap { flex:1; position:relative; max-width:520px; }
    .search-wrap i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); }
    .search-input {
      width:100%; background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary);
      border-radius:11px; padding:11px 14px 11px 40px; font-size:0.92rem; transition:border-color .2s, box-shadow .2s;
    }
    .search-input:focus { outline:none; border-color:var(--border-hover); box-shadow:0 0 0 3px rgba(245,69,92,0.12); }
    .search-input::placeholder { color:var(--text-muted); }

    .header-actions { display:flex; align-items:center; gap:8px; }
    .header-link {
      font-size:0.88rem; font-weight:600; color:var(--text-secondary); padding:8px 12px; border-radius:9px; transition:color .2s, background .2s; white-space:nowrap;
    }
    .header-link:hover { color:var(--text-primary); background:var(--bg-card); }
    .cart-btn {
      position:relative; display:flex; align-items:center; gap:8px; background:var(--bg-card);
      border:1px solid var(--border); padding:9px 15px; border-radius:11px; font-weight:600; font-size:0.9rem; transition:border-color .2s, transform .15s;
    }
    .cart-btn:hover { border-color:var(--border-hover); transform:translateY(-1px); }
    .cart-count {
      position:absolute; top:-8px; right:-8px; min-width:20px; height:20px; padding:0 5px;
      background:var(--gradient); color:#fff; font-size:0.7rem; font-weight:700; border-radius:10px; display:grid; place-items:center;
      border:2px solid var(--bg-primary);
    }

    /* ===== Hero deals strip (compact) ===== */
    .hero {
      background:
        radial-gradient(1000px 300px at 12% -40%, rgba(240,78,99,0.11), transparent 62%),
        var(--bg-surface);
      border-bottom:1px solid var(--border); padding:22px 0;
    }
    .hero-inner { display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; }
    .hero h1 { font-size:clamp(1.25rem,2.4vw,1.7rem); font-weight:700; letter-spacing:-0.8px; }
    .hero p { color:var(--text-secondary); margin-top:5px; max-width:520px; font-size:0.88rem; }
    .hero-tag { display:inline-flex; align-items:center; gap:7px; font-size:0.64rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--accent); margin-bottom:7px; }
    .hero-cta {
      display:inline-flex; align-items:center; gap:8px; background:var(--gradient); color:#fff; font-weight:600;
      padding:10px 20px; border-radius:10px; box-shadow:0 12px 28px -14px rgba(240,78,99,0.7); transition:transform .15s, box-shadow .2s; font-size:0.87rem; margin-top:13px;
    }
    .hero-cta:hover { transform:translateY(-2px); box-shadow:0 16px 34px -14px rgba(240,78,99,0.8); }
    .hero-deal-card {
      background:var(--bg-card);
      border:1px solid var(--border); border-radius:12px; padding:14px 20px; min-width:200px;
    }
    .hero-deal-card .big { font-size:1.6rem; font-weight:800; font-family:'Space Grotesk'; color:var(--deal); line-height:1.1; }

    /* ===== Layout ===== */
    .shop { padding:34px 0 80px; }
    .shop-grid { display:grid; grid-template-columns:264px 1fr; gap:28px; align-items:start; }

    /* ===== Filters (FACETED SEARCH) ===== */
    .filters {
      position:sticky; top:88px; background:var(--bg-surface); border:1px solid var(--border);
      border-radius:var(--radius-card); padding:20px; max-height:calc(100vh - 108px); overflow-y:auto;
    }
    .filters-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .filters-head h3 { font-size:1rem; display:flex; align-items:center; gap:8px; }
    .clear-btn { font-size:0.78rem; font-weight:600; color:var(--accent); padding:4px 8px; border-radius:7px; }
    .clear-btn:hover { background:var(--bg-card); }
    .clear-btn:disabled { color:var(--text-muted); cursor:not-allowed; background:none; }
    .facet { border-top:1px solid var(--border); padding:16px 0 4px; }
    .facet:first-of-type { border-top:none; }
    .facet-title { font-size:0.72rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-secondary); margin-bottom:12px; }
    .facet-opt { display:flex; align-items:center; gap:10px; padding:6px 0; font-size:0.9rem; cursor:pointer; color:var(--text-primary); user-select:none; }
    .facet-opt .count { margin-left:auto; font-size:0.75rem; color:var(--text-muted); }
    .facet-opt input { accent-color:var(--accent); width:16px; height:16px; cursor:pointer; }
    .facet-opt:hover { color:var(--accent); }

    .swatches { display:flex; flex-wrap:wrap; gap:9px; }
    .swatch {
      width:30px; height:30px; border-radius:9px; border:2px solid var(--border); position:relative; transition:transform .12s;
    }
    .swatch:hover { transform:scale(1.1); }
    .swatch.on { border-color:var(--accent); box-shadow:0 0 0 3px rgba(245,69,92,0.2); }
    .swatch.on::after { content:'\2713'; position:absolute; inset:0; display:grid; place-items:center; color:#fff; font-size:0.8rem; text-shadow:0 1px 3px rgba(0,0,0,0.8); }

    .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; font-size:0.9rem; }
    .switch { position:relative; width:42px; height:24px; }
    .switch input { opacity:0; width:0; height:0; }
    .slider {
      position:absolute; inset:0; background:var(--bg-card); border:1px solid var(--border); border-radius:24px; transition:.2s;
    }
    .slider::before { content:''; position:absolute; height:16px; width:16px; left:3px; top:3px; background:var(--text-secondary); border-radius:50%; transition:.2s; }
    .switch input:checked + .slider { background:var(--accent); border-color:var(--accent); }
    .switch input:checked + .slider::before { transform:translateX(18px); background:#fff; }

    /* ===== Results toolbar ===== */
    .toolbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
    .result-count { color:var(--text-secondary); font-size:0.9rem; }
    .result-count b { color:var(--text-primary); }
    .sort-select {
      background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary); border-radius:9px;
      padding:9px 12px; font-size:0.88rem; font-weight:500;
    }
    .sort-select:focus { outline:none; border-color:var(--border-hover); }
    .active-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
    .chip {
      display:inline-flex; align-items:center; gap:7px; background:var(--bg-card); border:1px solid var(--border);
      border-radius:20px; padding:5px 8px 5px 12px; font-size:0.8rem; color:var(--text-secondary);
    }
    .chip button { display:grid; place-items:center; width:18px; height:18px; border-radius:50%; color:var(--text-muted); }
    .chip button:hover { background:var(--danger); color:#fff; }

    /* ===== Product grid ===== */
    .product-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(232px, 1fr)); gap:22px; }
    .card {
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-card); overflow:hidden;
      display:flex; flex-direction:column; transition:transform .2s, border-color .2s, box-shadow .25s; position:relative;
    }
    .card:hover { transform:translateY(-4px); border-color:var(--border-hover); box-shadow:var(--shadow); }
    .card-media {
      height:168px; display:grid; place-items:center; position:relative; cursor:pointer;
      background:linear-gradient(160deg, var(--bg-elevated), var(--bg-card));
      color:var(--text-secondary); border-bottom:1px solid var(--border);
      transition:color .25s;
    }
    .card:hover .card-media { color:var(--accent); }
    .card-media svg { transition:transform .3s cubic-bezier(.34,1.4,.64,1); }
    .card:hover .card-media svg { transform:translateY(-2px) scale(1.05); }
    .card-badges { position:absolute; top:12px; left:12px; display:flex; flex-direction:column; gap:6px; }
    .badge {
      font-size:0.62rem; font-weight:700; padding:3px 8px; border-radius:6px; letter-spacing:0.7px; text-transform:uppercase;
      backdrop-filter:blur(4px);
    }
    .badge-deal { background:rgba(24,20,14,0.92); color:var(--deal); border:1px solid rgba(231,178,74,0.4); }
    .badge-new  { background:rgba(26,15,17,0.92); color:var(--accent); border:1px solid rgba(240,78,99,0.42); }
    .badge-out  { background:rgba(20,19,23,0.92); color:var(--text-secondary); border:1px solid var(--border); }
    .quick-btn {
      position:absolute; bottom:12px; right:12px; background:rgba(14,13,17,0.7); backdrop-filter:blur(6px);
      border:1px solid var(--border); width:34px; height:34px; border-radius:9px; display:grid; place-items:center;
      color:var(--text-primary); opacity:0; transform:translateY(4px); transition:opacity .2s, transform .2s; font-size:0.95rem;
    }
    .card:hover .quick-btn { opacity:1; transform:none; }
    .quick-btn:hover { border-color:var(--border-hover); color:var(--accent); }
    .card-body { padding:16px 17px 18px; display:flex; flex-direction:column; flex:1; }
    .card-brand { font-size:0.68rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); }
    .card-name { font-size:0.96rem; font-weight:600; margin:5px 0 8px; line-height:1.35; cursor:pointer; transition:color .15s; }
    .card-name:hover { color:var(--accent); }
    .stars { color:var(--deal); font-size:0.8rem; letter-spacing:1px; }
    .stars .rev { color:var(--text-muted); font-size:0.78rem; margin-left:6px; letter-spacing:0; }
    .card-colors { display:flex; gap:5px; margin:11px 0 13px; }
    .mini-swatch { width:13px; height:13px; border-radius:4px; border:1px solid var(--border); }
    .card-foot { margin-top:auto; display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .price { font-family:'Space Grotesk'; font-weight:700; font-size:1.12rem; letter-spacing:-0.3px; }
    .price .old { font-size:0.8rem; color:var(--text-muted); text-decoration:line-through; margin-right:6px; font-weight:400; }
    .add-btn {
      background:transparent; color:var(--text-primary); border:1px solid rgba(255,255,255,0.14);
      font-weight:600; font-size:0.82rem; padding:8px 14px; border-radius:9px;
      display:inline-flex; align-items:center; gap:6px; transition:background .18s, border-color .18s, color .18s;
    }
    .add-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
    .add-btn:disabled { background:transparent; border-color:var(--border); color:var(--text-muted); cursor:not-allowed; }

    .empty { text-align:center; padding:70px 20px; color:var(--text-secondary); }
    .empty i { font-size:3rem; color:var(--text-muted); display:block; margin-bottom:14px; }

    /* ===== Modal / Drawer shared ===== */
    .overlay { position:fixed; inset:0; background:rgba(6,5,8,0.74); backdrop-filter:blur(5px); z-index:200; display:flex; }
    .modal {
      background:var(--bg-surface); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow);
      max-width:640px; width:calc(100% - 32px); margin:auto; max-height:90vh; overflow-y:auto; animation:pop .25s ease;
    }
    @keyframes pop { from{opacity:0; transform:translateY(16px) scale(.98);} to{opacity:1; transform:none;} }
    .modal-head { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg-surface); z-index:2; }
    .modal-head h3 { font-size:1.15rem; }
    .icon-btn { width:36px; height:36px; border-radius:9px; display:grid; place-items:center; color:var(--text-secondary); transition:background .2s,color .2s; font-size:1.1rem; }
    .icon-btn:hover { background:var(--bg-card); color:var(--text-primary); }

    /* Cart drawer */
    .drawer { margin:0 0 0 auto; height:100%; max-height:100%; width:420px; max-width:calc(100% - 24px); border-radius:0; display:flex; flex-direction:column; animation:slideIn .28s ease; }
    @keyframes slideIn { from{transform:translateX(40px); opacity:.6;} to{transform:none; opacity:1;} }
    .cart-items { flex:1; overflow-y:auto; padding:8px 20px; }
    .cart-line { display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--border); }
    .cart-thumb { width:60px; height:60px; border-radius:11px; display:grid; place-items:center; font-size:1.8rem; flex-shrink:0; }
    .cart-line-info { flex:1; min-width:0; }
    .cart-line-info h5 { font-size:0.92rem; font-weight:600; }
    .cart-line-info .b { font-size:0.74rem; color:var(--accent); text-transform:uppercase; font-weight:700; }
    .qty { display:inline-flex; align-items:center; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-top:8px; }
    .qty button { width:28px; height:28px; display:grid; place-items:center; color:var(--text-secondary); font-size:1rem; }
    .qty button:hover { background:var(--bg-card); color:var(--text-primary); }
    .qty span { width:34px; text-align:center; font-size:0.88rem; font-weight:600; }
    .remove-line { font-size:0.76rem; color:var(--text-muted); margin-top:6px; }
    .remove-line:hover { color:var(--danger); }
    .cart-foot { border-top:1px solid var(--border); padding:20px; background:var(--bg-elevated); }
    .cart-row { display:flex; justify-content:space-between; font-size:0.9rem; color:var(--text-secondary); margin-bottom:8px; }
    .cart-row.total { color:var(--text-primary); font-weight:700; font-size:1.15rem; font-family:'Space Grotesk'; margin:12px 0 16px; }
    .btn-primary {
      width:100%; background:var(--gradient); color:#fff; font-weight:700; padding:14px; border-radius:12px; font-size:0.95rem;
      display:flex; align-items:center; justify-content:center; gap:9px; transition:transform .12s, filter .2s;
    }
    .btn-primary:hover { transform:translateY(-1px); filter:brightness(1.07); }
    .btn-primary:disabled { background:#3a2529; color:var(--text-muted); cursor:not-allowed; transform:none; }
    .btn-ghost { width:100%; background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary); font-weight:600; padding:12px; border-radius:11px; transition:border-color .2s; }
    .btn-ghost:hover { border-color:var(--border-hover); }

    /* Product quick view */
    .qv-media { height:240px; display:grid; place-items:center; border-bottom:1px solid var(--border); position:relative; background:linear-gradient(160deg, var(--bg-elevated), var(--bg-card)); color:var(--accent); }
    .qv-body { padding:24px; }
    .qv-body h2 { font-size:1.5rem; margin:4px 0 10px; }
    .spec-list { margin:18px 0; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .spec-row { display:flex; justify-content:space-between; padding:11px 16px; font-size:0.88rem; }
    .spec-row:nth-child(odd) { background:var(--bg-card); }
    .spec-row .k { color:var(--text-secondary); }
    .spec-row .v { color:var(--text-primary); font-weight:600; }
    .qv-blurb { color:var(--text-secondary); font-size:0.94rem; line-height:1.7; }

    /* ===== Checkout stepper (FOLLOW INSTRUCTIONS) ===== */
    .checkout-modal { max-width:760px; }
    .stepper { display:flex; align-items:flex-start; padding:24px 24px 4px; gap:6px; }
    .step { flex:1; text-align:center; position:relative; }
    .step-dot {
      width:38px; height:38px; border-radius:50%; display:grid; place-items:center; margin:0 auto 8px;
      background:var(--bg-card); border:2px solid var(--border); color:var(--text-muted); font-weight:700; transition:.25s; position:relative; z-index:2;
    }
    .step.active .step-dot { background:var(--gradient); border-color:transparent; color:#fff; box-shadow:0 0 0 5px rgba(245,69,92,0.15); }
    .step.done .step-dot { background:var(--success); border-color:transparent; color:#06210f; }
    .step-label { font-size:0.8rem; font-weight:600; color:var(--text-muted); }
    .step.active .step-label { color:var(--text-primary); }
    .step.done .step-label { color:var(--success); }
    .step::before {
      content:''; position:absolute; top:19px; left:-50%; width:100%; height:2px; background:var(--border); z-index:1;
    }
    .step:first-child::before { display:none; }
    .step.done::before, .step.active::before { background:var(--accent); }
    .step-hint { text-align:center; color:var(--text-secondary); font-size:0.85rem; padding:6px 24px 0; }
    .checkout-body { padding:22px 24px 24px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field.full { grid-column:1 / -1; }
    .field label { font-size:0.82rem; font-weight:600; color:var(--text-secondary); }
    .field label .req { color:var(--danger); }
    .field input, .field select, .field textarea {
      background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary); border-radius:10px;
      padding:11px 13px; font-size:0.9rem; font-family:inherit; transition:border-color .2s, box-shadow .2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { outline:none; border-color:var(--border-hover); box-shadow:0 0 0 3px rgba(245,69,92,0.1); }
    .field.err input, .field.err select { border-color:var(--danger); }
    .err-msg { font-size:0.76rem; color:var(--danger); display:flex; align-items:center; gap:5px; }
    .checkout-foot { display:flex; gap:12px; margin-top:22px; }
    .checkout-foot .btn-primary, .checkout-foot .btn-ghost { width:auto; flex:1; }
    .review-line { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:0.9rem; }
    .secure-note { display:flex; align-items:center; gap:8px; color:var(--text-muted); font-size:0.8rem; margin-top:14px; justify-content:center; }

    /* Confirmation */
    .confirm { text-align:center; padding:34px 30px 30px; }
    .confirm-icon { width:80px; height:80px; border-radius:50%; background:rgba(34,197,94,0.14); color:var(--success); display:grid; place-items:center; font-size:2.6rem; margin:0 auto 20px; animation:pop .4s ease; }
    .confirm h2 { font-size:1.7rem; margin-bottom:8px; }
    .confirm p { color:var(--text-secondary); max-width:400px; margin:0 auto 8px; }
    .order-num { font-family:'JetBrains Mono',monospace; background:var(--bg-card); border:1px solid var(--border); border-radius:9px; padding:8px 16px; display:inline-block; margin:14px 0 24px; color:var(--accent); font-weight:600; }
    .survey-prompt {
      background:linear-gradient(135deg, rgba(245,69,92,0.12), rgba(249,115,22,0.06));
      border:1px solid var(--border-hover); border-radius:14px; padding:20px; margin-top:8px;
    }
    .survey-prompt h4 { font-size:1.05rem; margin-bottom:6px; }
    .survey-prompt p { font-size:0.9rem; margin-bottom:14px; }

    /* ===== Survey (COMMUNICATE) ===== */
    .rate-stars { display:flex; gap:8px; justify-content:center; margin:6px 0 4px; }
    .rate-stars button { font-size:2rem; color:var(--text-muted); transition:transform .1s, color .15s; }
    .rate-stars button:hover { transform:scale(1.15); }
    .rate-stars button.on { color:var(--deal); }
    .rate-label { text-align:center; color:var(--text-secondary); font-size:0.88rem; min-height:20px; margin-bottom:10px; }
    .pill-group { display:flex; flex-wrap:wrap; gap:10px; }
    .pill {
      border:1px solid var(--border); background:var(--bg-card); border-radius:22px; padding:9px 16px; font-size:0.86rem; font-weight:500; transition:.15s; color:var(--text-secondary);
    }
    .pill:hover { border-color:var(--border-hover); color:var(--text-primary); }
    .pill.on { background:var(--gradient); border-color:transparent; color:#fff; }
    .survey-q { margin-bottom:22px; }
    .survey-q > label { font-size:0.95rem; font-weight:600; display:block; margin-bottom:10px; }

    /* ===== Footer ===== */
    .site-footer { border-top:1px solid var(--border); background:var(--bg-surface); padding:40px 0 30px; }
    .footer-inner { display:flex; justify-content:space-between; align-items:center; gap:20px; flex-wrap:wrap; }
    .footer-inner .muted { color:var(--text-muted); font-size:0.85rem; }
    .back-portfolio { display:inline-flex; align-items:center; gap:8px; color:var(--text-secondary); font-size:0.88rem; font-weight:600; padding:9px 15px; border:1px solid var(--border); border-radius:10px; transition:border-color .2s,color .2s; }
    .back-portfolio:hover { color:var(--accent); border-color:var(--border-hover); }

    /* Toast */
    .toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:300;
      background:var(--bg-elevated); border:1px solid var(--border-hover); color:var(--text-primary);
      padding:13px 20px; border-radius:12px; box-shadow:var(--shadow); display:flex; align-items:center; gap:10px; font-size:0.9rem; font-weight:500;
      animation:toastIn .3s ease;
    }
    .toast i { color:var(--success); font-size:1.2rem; }
    @keyframes toastIn { from{opacity:0; transform:translate(-50%,12px);} to{opacity:1; transform:translate(-50%,0);} }

    /* ===== Responsive ===== */
    .filter-toggle { display:none; }
    @media (max-width: 900px) {
      .shop-grid { grid-template-columns:1fr; }
      .filters {
        position:fixed; top:0; left:0; height:100%; max-height:100%; width:300px; max-width:85%; z-index:120;
        border-radius:0; transform:translateX(-105%); transition:transform .3s ease;
      }
      .filters.open { transform:none; box-shadow:var(--shadow); }
      .filter-toggle {
        display:inline-flex; align-items:center; gap:8px; background:var(--bg-card); border:1px solid var(--border);
        color:var(--text-primary); font-weight:600; padding:10px 16px; border-radius:10px; font-size:0.88rem;
      }
      .search-wrap { display:none; }
    }
    @media (max-width: 620px) {
      .header-link.hide-sm { display:none; }
      .form-grid { grid-template-columns:1fr; }
      .step-label { font-size:0.68rem; }
      .hero-deal-card { display:none; }
    }
  </style>
</head>

  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // Force the CLASSIC JSX runtime so Babel emits React.createElement (uses the
    // global UMD React) instead of `import`-ing react/jsx-runtime, which cannot
    // run inside a plain <script>.
    Babel.registerPreset("react-classic", {
      presets: [[Babel.availablePresets["react"], { runtime: "classic" }]]
    });
  </script>

  <!-- React 18 application (JSX), compiled in-browser by Babel Standalone. Source: app.jsx -->
  <script type="text/babel" data-presets="react-classic" src="app.jsx"></script>
</body>
</html>
